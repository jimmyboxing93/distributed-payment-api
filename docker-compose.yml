version: '3.4'

services:
  mssql_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Roberto56!
    ports:
      - "1433:1433"

  api-service:
    build:
      context: ./MVCProject1/MVCProject1
      dockerfile: Dockerfile
    container_name: payment_api
    environment:
      - ConnectionStrings__DefaultConnection=Server=mssql_db;Database=UserDb;User Id=sa;Password=Roberto56!;TrustServerCertificate=True
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - mssql_db

  ui-service:
    build:
      context: ./MVCProject1/ViewApi
      dockerfile: Dockerfile
    container_name: payment_ui
    environment:
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5000:80"
    depends_on:
      - api-service

volumes:
  mssql_data:
