services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api-service:
    build: 
      context: ./PaymentGateway.API/PaymentGateway.API
      dockerfile: Dockerfile
    container_name: payment_api
    environment:
      # Note the double underscore for nested JSON keys
      - ConnectionStrings__DefaultConnection=Server=database;Database=UserDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    depends_on:
      - database

  ui-service:
    build: 
      context: ./ViewApi
      dockerfile: Dockerfile
    container_name: payment_ui
    ports:
      - "5000:80"
    depends_on:
      - api-service

volumes:
  mssql_data: