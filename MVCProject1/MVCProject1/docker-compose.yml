services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - payment-net

  api-service:
    build: 
      context: ./MVCProject1/MVCProject1
      dockerfile: Dockerfile
    container_name: payment_api
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql_db;Database=${DB_NAME_API};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ApiKey=${API_KEY}
    depends_on:
      - database
    networks:
      - payment-net

  ui-service:
    build: 
      context: ./MVCProject1
      dockerfile: ViewApi/Dockerfile
    container_name: payment_ui
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mssql_db;Database=${DB_NAME_UI};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ApiKey=${API_KEY}
      - ApiBaseUrl=http://payment_api/
    depends_on:
      - api-service
    networks:
      - payment-net
    volumes:
      - ui_keys:/root/.aspnet/DataProtection-Keys

volumes:
  mssql_data:
  ui_keys:  
  
networks:
  payment-net:
    driver: bridge