name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore DistributedPaymentSystem.sln
      
    - name: Build
      run: dotnet build DistributedPaymentSystem.sln --no-restore --configuration Release

    - name: Test
      run:  dotnet test src/PaymentProcessing.Tests/PaymentProcessing.Tests.csproj --no-build --configuration Release --verbosity normal